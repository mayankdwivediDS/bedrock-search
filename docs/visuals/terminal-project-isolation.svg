<g><rect x="650" y="650" width="510" height="320" rx="22" class="node"/><text x="700" y="720" class="l" font-size="38">catalog</text><text x="700" y="765" class="d" font-size="22">independent discovery search</text><rect x="700" y="810" width="120" height="72" rx="9" fill="#0d3b49" stroke="#22d3ee"/><rect x="850" y="810" width="120" height="72" rx="9" fill="#321744" stroke="#e879f9"/><rect x="1000" y="810" width="120" height="72" rx="9" fill="#153323" stroke="#34d399"/><text x="716" y="851" class="d" font-size="17">CORPUS</text><text x="875" y="851" class="d" font-size="17">CACHE</text><text x="1015" y="851" class="d" font-size="17">HISTORY</text><text x="700" y="927" class="m" font-size="20">data/catalog/  •  ready</text></g>
<rect x="1290" y="360" width="510" height="500" rx="22" fill="#07140f" stroke="#34d399" stroke-width="2"/><text x="1340" y="430" class="m" font-size="34">operator workflow</text><text x="1340" y="500" class="t" font-size="25">01  create project</text><text x="1340" y="565" class="t" font-size="25">02  import CSV file set</text><text x="1340" y="630" class="t" font-size="25">03  inspect hot / cold cache</text><text x="1340" y="695" class="t" font-size="25">04  call API or Swagger</text><text x="1340" y="780" class="d" font-size="19">No cross-project data leakage.</text></svg>
