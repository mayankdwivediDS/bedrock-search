<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 1920 1080">
<defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#050b09"/><stop offset="1" stop-color="#101235"/></linearGradient><style>text{font-family:Consolas,monospace}.t{fill:#ecfdf5}.m{fill:#86efac}.l{fill:#a5b4fc}.d{fill:#94a3b8}.box{fill:#07140f;stroke:#34d399;stroke-width:2}.node{fill:#111a3f;stroke:#818cf8;stroke-width:2}</style></defs>
<rect width="1920" height="1080" fill="url(#bg)"/><text x="100" y="110" class="m" font-size="34">bedrock@projects:~$ list --isolated</text><text x="100" y="165" class="t" font-size="56" font-weight="700">One console. Many independent search systems.</text><text x="100" y="212" class="d" font-size="25">Each project owns its corpus, versions, cache, blacklist, and source-file history.</text>
<rect x="100" y="310" width="330" height="590" rx="20" class="box"/><text x="145" y="375" class="m" font-size="34">LOCAL NODE</text><circle cx="160" cy="430" r="9" fill="#34d399"/><text x="185" y="440" class="t" font-size="29">online</text><path d="M150 505H380M150 590H380M150 675H380M150 760H380" stroke="#1f6b49" stroke-width="2"/><text x="150" y="550" class="d" font-size="24">project manager</text><text x="150" y="635" class="d" font-size="24">admin auth</text><text x="150" y="720" class="d" font-size="24">metrics</text><text x="150" y="805" class="d" font-size="24">API + Swagger</text>
<path d="M470 500H600M470 720H600" stroke="#34d399" stroke-width="4"/><path d="M580 488L610 500L580 512ZM580 708L610 720L580 732Z" fill="#34d399"/>
